{{- if .Values.networkPolicy.enabled }}
{{- if .Values.networkPolicy.defaultDenyIngress }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.app.name }}-default-deny-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.app.name }}
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
{{- end }}
---
{{- if .Values.networkPolicy.defaultDenyEgress }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.app.name }}-default-deny-egress
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.app.name }}
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Egress
{{- end }}
{{- end }}
